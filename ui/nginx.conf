server {
    listen 80;
    server_name _;

    # ── Static React bundle ─────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Support client-side routing (React Router, etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── GraphQL proxy (HTTP + WebSocket) ────────────────────────────────────────
    location /graphql {
        proxy_pass http://hardware-monitor-server:4000;

        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (required for GraphQL subscriptions)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Keep long-lived WebSocket connections alive
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Health check endpoint (used by Docker healthcheck) ──────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Disable noisy favicon 404s
    location = /favicon.ico { access_log off; log_not_found off; }
}
